    <title>Sequence Classic - Haba</title>

        :root { --navy: #0d1b2a; --gold: #c2991d; --cell-bg: #1b263b; --red: #ff4757; }
        body { background: var(--navy); font-family: 'Tajawal', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; color: white; }

        /* اللوحة - ترتيب سكوينس */
        .board { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; 
            background: var(--gold); padding: 4px; border-radius: 8px;
            width: 95vw; max-width: 500px; aspect-ratio: 1/1; margin-top: 20px;
        }
        .cell { 
            background: var(--cell-bg); display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold; position: relative; border-radius: 2px;
        }
        .cell-free { background: var(--gold) !important; color: var(--navy); font-size: 8px; }
